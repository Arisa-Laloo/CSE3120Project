name: REVU MASM Compilation

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Verify tools
        shell: cmd
        run: |
          where ml
          where link

      - name: Compile MASM project
        shell: cmd
        run: |
          ml /c /coff /I Irvine main.asm
          link /SUBSYSTEM:CONSOLE main.obj /LIBPATH:Irvine Irvine32.lib kernel32.lib user32.lib

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: |
            *.exe
            *.obj
            *.lst
            *.map
